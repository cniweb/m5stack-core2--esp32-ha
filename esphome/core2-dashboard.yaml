substitutions:
  device_name: core2-energy-display
  friendly_name: Core2 Energy Display

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    upload_speed: 460800

esp32:
  variant: esp32
  framework:
    type: arduino

psram:
  mode: quad
  speed: 80MHz

globals:
  - id: active_page
    type: int
    restore_value: no
    initial_value: '0'

logger:

api:

ota:

wifi:
  ssid: "CHANGE_ME_WIFI_SSID"
  password: "CHANGE_ME_WIFI_PASSWORD"

  ap:
    ssid: "${friendly_name} Fallback"
    password: "CHANGE_ME_FALLBACK_PASSWORD"

captive_portal:

external_components:
  - source: github://stefanthoss/esphome-axp2101
    components: [axp2101]

i2c:
  - id: bus_a
    sda: GPIO21
    scl: GPIO22
    scan: true

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO38

time:
  - platform: homeassistant
    id: ha_time

font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 14

  - file: "gfonts://Roboto"
    id: font_medium
    size: 20

  - file: "gfonts://Roboto"
    id: font_large
    size: 28

sensor:
  - platform: axp2101
    model: M5CORE2
    address: 0x34
    i2c_id: bus_a
    brightness: 75%
    battery_level:
      name: "${friendly_name} Battery Level"
      id: battery_level

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    id: wifi_signal_db
    update_interval: 60s

  - platform: homeassistant
    id: solar_power_live
    entity_id: sensor.core2_solar_live
    internal: true

  - platform: homeassistant
    id: house_power_live
    entity_id: sensor.core2_house_live
    internal: true

  - platform: homeassistant
    id: solar_day_energy_kwh
    entity_id: sensor.core2_solar_day_energy_kwh
    internal: true

  - platform: homeassistant
    id: house_day_energy_kwh
    entity_id: sensor.core2_house_day_energy_kwh
    internal: true

  - platform: homeassistant
    id: grid_import_power_live
    entity_id: sensor.core2_grid_import_power
    internal: true

  - platform: homeassistant
    id: grid_export_power_live
    entity_id: sensor.core2_grid_export_power
    internal: true

  - platform: homeassistant
    id: grid_import_day_energy_kwh
    entity_id: sensor.core2_grid_import_day_energy_kwh
    internal: true

  - platform: homeassistant
    id: grid_export_day_energy_kwh
    entity_id: sensor.core2_grid_export_day_energy_kwh
    internal: true

  - platform: homeassistant
    id: solar_bucket_00
    entity_id: sensor.core2_solar_bucket_00
    internal: true

  - platform: homeassistant
    id: solar_bucket_01
    entity_id: sensor.core2_solar_bucket_01
    internal: true

  - platform: homeassistant
    id: solar_bucket_02
    entity_id: sensor.core2_solar_bucket_02
    internal: true

  - platform: homeassistant
    id: solar_bucket_03
    entity_id: sensor.core2_solar_bucket_03
    internal: true

  - platform: homeassistant
    id: solar_bucket_04
    entity_id: sensor.core2_solar_bucket_04
    internal: true

  - platform: homeassistant
    id: solar_bucket_05
    entity_id: sensor.core2_solar_bucket_05
    internal: true

  - platform: homeassistant
    id: solar_bucket_06
    entity_id: sensor.core2_solar_bucket_06
    internal: true

  - platform: homeassistant
    id: solar_bucket_07
    entity_id: sensor.core2_solar_bucket_07
    internal: true

  - platform: homeassistant
    id: house_bucket_00
    entity_id: sensor.core2_house_bucket_00
    internal: true

  - platform: homeassistant
    id: house_bucket_01
    entity_id: sensor.core2_house_bucket_01
    internal: true

  - platform: homeassistant
    id: house_bucket_02
    entity_id: sensor.core2_house_bucket_02
    internal: true

  - platform: homeassistant
    id: house_bucket_03
    entity_id: sensor.core2_house_bucket_03
    internal: true

  - platform: homeassistant
    id: house_bucket_04
    entity_id: sensor.core2_house_bucket_04
    internal: true

  - platform: homeassistant
    id: house_bucket_05
    entity_id: sensor.core2_house_bucket_05
    internal: true

  - platform: homeassistant
    id: house_bucket_06
    entity_id: sensor.core2_house_bucket_06
    internal: true

  - platform: homeassistant
    id: house_bucket_07
    entity_id: sensor.core2_house_bucket_07
    internal: true

display:
  - platform: mipi_spi
    id: main_display
    model: M5CORE2
    update_interval: 2s
    lambda: |-
      auto bg = Color(14, 20, 27);
      auto panel = Color(23, 32, 42);
      auto grid = Color(80, 96, 111);
      auto text = Color(243, 246, 248);
      auto solar_color = Color(247, 181, 0);
      auto house_color = Color(83, 197, 255);
      auto sum_color = Color(154, 205, 50);
      auto warn_color = Color(255, 122, 89);
      auto import_color = Color(255, 94, 77);
      auto export_color = Color(72, 217, 168);

      auto clamp_value = [](float value, float min_value, float max_value) {
        if (value < min_value) {
          return min_value;
        }
        if (value > max_value) {
          return max_value;
        }
        return value;
      };

      auto draw_card = [&](int x, int y, int w, int h, Color border) {
        it.filled_rectangle(x, y, w, h, panel);
        it.rectangle(x, y, w, h, border);
      };

      auto draw_gauge = [&](int cx, int cy, int radius, float value, float max_value, Color accent, const char *title) {
        value = clamp_value(value, 0.0f, max_value);
        float ratio = value / max_value;
        float angle_deg = 150.0f + ratio * 240.0f;
        float angle_rad = angle_deg * 0.0174532925f;

        draw_card(cx - radius - 8, cy - radius - 18, radius * 2 + 16, radius * 2 + 36, accent);
        it.printf(cx - radius, cy - radius - 12, id(font_medium), accent, TextAlign::TOP_LEFT, "%s", title);
        it.circle(cx, cy, radius, grid);
        it.circle(cx, cy, radius - 1, grid);
        it.filled_circle(cx, cy, 4, accent);

        for (int i = 0; i <= 5; i++) {
          float tick_ratio = i / 5.0f;
          float tick_deg = 150.0f + tick_ratio * 240.0f;
          float tick_rad = tick_deg * 0.0174532925f;
          int x1 = cx + (int) ((radius - 6) * cosf(tick_rad));
          int y1 = cy + (int) ((radius - 6) * sinf(tick_rad));
          int x2 = cx + (int) (radius * cosf(tick_rad));
          int y2 = cy + (int) (radius * sinf(tick_rad));
          it.line(x1, y1, x2, y2, grid);
        }

        int nx = cx + (int) ((radius - 10) * cosf(angle_rad));
        int ny = cy + (int) ((radius - 10) * sinf(angle_rad));
        it.line(cx, cy, nx, ny, accent);
        it.printf(cx, cy + radius + 6, id(font_large), text, TextAlign::TOP_CENTER, "%.0f W", value);
      };

      auto draw_bar_row = [&](int x, int y, float max_value, Color accent, const float *values) {
        const int bar_width = 10;
        const int bar_gap = 4;
        const int bar_height = 28;

        for (int i = 0; i < 8; i++) {
          float bucket_value = clamp_value(values[i], 0.0f, max_value);
          int fill_height = (int) ((bucket_value / max_value) * bar_height);
          int bar_x = x + i * (bar_width + bar_gap);
          int bar_y = y + (bar_height - fill_height);

          it.rectangle(bar_x, y, bar_width, bar_height, grid);
          if (fill_height > 0) {
            int inner_height = fill_height > 2 ? fill_height - 2 : 1;
            it.filled_rectangle(bar_x + 1, bar_y + 1, bar_width - 2, inner_height, accent);
          }
        }
      };

      auto draw_progress = [&](int x, int y, int w, int h, float value, float max_value, Color accent, const char *label) {
        float clamped = clamp_value(value, 0.0f, max_value);
        int fill = (int) ((clamped / max_value) * (float) w);
        it.printf(x, y - 16, id(font_small), accent, TextAlign::TOP_LEFT, "%s", label);
        it.rectangle(x, y, w, h, grid);
        if (fill > 0) {
          it.filled_rectangle(x + 1, y + 1, fill > 2 ? fill - 2 : 1, h - 2, accent);
        }
      };

      auto draw_nav_tab = [&](int x, int width, int page_id, const char *label, Color accent) {
        bool active = id(active_page) == page_id;
        Color fill = active ? accent : panel;
        Color outline = active ? accent : grid;
        Color label_color = active ? bg : text;
        it.filled_rectangle(x, 214, width, 22, fill);
        it.rectangle(x, 214, width, 22, outline);
        it.printf(x + width / 2, 218, id(font_small), label_color, TextAlign::TOP_CENTER, "%s", label);
      };

      float solar_now = id(solar_power_live).has_state() ? clamp_value(id(solar_power_live).state, 0.0f, 5000.0f) : 0.0f;
      float house_now = id(house_power_live).has_state() ? clamp_value(id(house_power_live).state, 0.0f, 5000.0f) : 0.0f;
      float solar_day = id(solar_day_energy_kwh).has_state() ? id(solar_day_energy_kwh).state : 0.0f;
      float house_day = id(house_day_energy_kwh).has_state() ? id(house_day_energy_kwh).state : 0.0f;
      float grid_import_now = id(grid_import_power_live).has_state() ? clamp_value(id(grid_import_power_live).state, 0.0f, 5000.0f) : 0.0f;
      float grid_export_now = id(grid_export_power_live).has_state() ? clamp_value(id(grid_export_power_live).state, 0.0f, 5000.0f) : 0.0f;
      float grid_import_day = id(grid_import_day_energy_kwh).has_state() ? id(grid_import_day_energy_kwh).state : 0.0f;
      float grid_export_day = id(grid_export_day_energy_kwh).has_state() ? id(grid_export_day_energy_kwh).state : 0.0f;
      float net_now = solar_now - house_now;

      float solar_values[8] = {
        id(solar_bucket_00).has_state() ? id(solar_bucket_00).state : 0.0f,
        id(solar_bucket_01).has_state() ? id(solar_bucket_01).state : 0.0f,
        id(solar_bucket_02).has_state() ? id(solar_bucket_02).state : 0.0f,
        id(solar_bucket_03).has_state() ? id(solar_bucket_03).state : 0.0f,
        id(solar_bucket_04).has_state() ? id(solar_bucket_04).state : 0.0f,
        id(solar_bucket_05).has_state() ? id(solar_bucket_05).state : 0.0f,
        id(solar_bucket_06).has_state() ? id(solar_bucket_06).state : 0.0f,
        id(solar_bucket_07).has_state() ? id(solar_bucket_07).state : 0.0f
      };

      float house_values[8] = {
        id(house_bucket_00).has_state() ? id(house_bucket_00).state : 0.0f,
        id(house_bucket_01).has_state() ? id(house_bucket_01).state : 0.0f,
        id(house_bucket_02).has_state() ? id(house_bucket_02).state : 0.0f,
        id(house_bucket_03).has_state() ? id(house_bucket_03).state : 0.0f,
        id(house_bucket_04).has_state() ? id(house_bucket_04).state : 0.0f,
        id(house_bucket_05).has_state() ? id(house_bucket_05).state : 0.0f,
        id(house_bucket_06).has_state() ? id(house_bucket_06).state : 0.0f,
        id(house_bucket_07).has_state() ? id(house_bucket_07).state : 0.0f
      };

      float solar_peak = 0.0f;
      float house_peak = 0.0f;
      for (int i = 0; i < 8; i++) {
        if (solar_values[i] > solar_peak) {
          solar_peak = solar_values[i];
        }
        if (house_values[i] > house_peak) {
          house_peak = house_values[i];
        }
      }

      it.fill(bg);

      if (id(active_page) == 0) {
        draw_gauge(82, 78, 42, solar_now, 5000.0f, solar_color, "Solar");
        draw_gauge(238, 78, 42, house_now, 5000.0f, house_color, "Verbrauch");

        it.printf(12, 138, id(font_small), solar_color, TextAlign::TOP_LEFT, "Solar heute");
        draw_bar_row(12, 156, 5000.0f, solar_color, solar_values);

        it.printf(12, 176, id(font_small), house_color, TextAlign::TOP_LEFT, "Verbrauch heute");
        draw_bar_row(12, 194, 5000.0f, house_color, house_values);
      }

      if (id(active_page) == 1) {
        draw_card(12, 12, 142, 64, solar_color);
        draw_card(166, 12, 142, 64, house_color);
        draw_card(12, 88, 142, 54, sum_color);
        draw_card(166, 88, 142, 54, warn_color);
        draw_card(12, 154, 296, 52, grid);

        it.printf(20, 20, id(font_small), solar_color, TextAlign::TOP_LEFT, "Solar aktuell");
        it.printf(20, 42, id(font_large), text, TextAlign::TOP_LEFT, "%.0f W", solar_now);

        it.printf(174, 20, id(font_small), house_color, TextAlign::TOP_LEFT, "Verbrauch aktuell");
        it.printf(174, 42, id(font_large), text, TextAlign::TOP_LEFT, "%.0f W", house_now);

        it.printf(20, 96, id(font_small), sum_color, TextAlign::TOP_LEFT, "Bilanz jetzt");
        if (net_now >= 0) {
          it.printf(20, 116, id(font_medium), text, TextAlign::TOP_LEFT, "+%.0f W Export", net_now);
        } else {
          it.printf(20, 116, id(font_medium), text, TextAlign::TOP_LEFT, "%.0f W Bezug", net_now);
        }

        it.printf(174, 96, id(font_small), warn_color, TextAlign::TOP_LEFT, "Spitzen heute");
        it.printf(174, 114, id(font_small), text, TextAlign::TOP_LEFT, "PV max %.0f W", solar_peak);
        it.printf(174, 130, id(font_small), text, TextAlign::TOP_LEFT, "Last %.0f W", house_peak);

        it.printf(20, 162, id(font_small), text, TextAlign::TOP_LEFT, "Systemstatus");
        if (id(ha_time).now().is_valid()) {
          it.strftime(20, 180, id(font_small), text, TextAlign::TOP_LEFT, "Zeit %H:%M", id(ha_time).now());
        }
        if (id(battery_level).has_state()) {
          it.printf(132, 180, id(font_small), text, TextAlign::TOP_LEFT, "Akku %.0f%%", id(battery_level).state);
        }
        if (id(wifi_signal_db).has_state()) {
          it.printf(228, 180, id(font_small), text, TextAlign::TOP_LEFT, "WiFi %.0f dB", id(wifi_signal_db).state);
        }
      }

      if (id(active_page) == 2) {
        draw_card(12, 12, 142, 82, solar_color);
        draw_card(166, 12, 142, 82, house_color);
        draw_card(12, 106, 296, 48, grid);
        draw_card(12, 166, 142, 40, solar_color);
        draw_card(166, 166, 142, 40, house_color);

        it.printf(20, 22, id(font_small), solar_color, TextAlign::TOP_LEFT, "Solar Summe heute");
        it.printf(20, 50, id(font_large), text, TextAlign::TOP_LEFT, "%.2f kWh", solar_day);

        it.printf(174, 22, id(font_small), house_color, TextAlign::TOP_LEFT, "Verbrauch heute");
        it.printf(174, 50, id(font_large), text, TextAlign::TOP_LEFT, "%.2f kWh", house_day);

        it.printf(20, 116, id(font_small), text, TextAlign::TOP_LEFT, "Tagesbilanz");
        it.printf(20, 132, id(font_medium), text, TextAlign::TOP_LEFT, "%.2f kWh", solar_day - house_day);

        it.printf(20, 176, id(font_small), solar_color, TextAlign::TOP_LEFT, "PV Spitze");
        it.printf(20, 190, id(font_medium), text, TextAlign::TOP_LEFT, "%.0f W", solar_peak);

        it.printf(174, 176, id(font_small), house_color, TextAlign::TOP_LEFT, "Last Spitze");
        it.printf(174, 190, id(font_medium), text, TextAlign::TOP_LEFT, "%.0f W", house_peak);
      }

      if (id(active_page) == 3) {
        draw_card(12, 12, 142, 70, import_color);
        draw_card(166, 12, 142, 70, export_color);
        draw_card(12, 94, 296, 48, grid);
        draw_card(12, 154, 142, 52, import_color);
        draw_card(166, 154, 142, 52, export_color);

        it.printf(20, 20, id(font_small), import_color, TextAlign::TOP_LEFT, "Netzbezug jetzt");
        it.printf(20, 44, id(font_large), text, TextAlign::TOP_LEFT, "%.0f W", grid_import_now);

        it.printf(174, 20, id(font_small), export_color, TextAlign::TOP_LEFT, "Einspeisung jetzt");
        it.printf(174, 44, id(font_large), text, TextAlign::TOP_LEFT, "%.0f W", grid_export_now);

        draw_progress(20, 114, 130, 14, grid_import_now, 5000.0f, import_color, "Import Last");
        draw_progress(174, 114, 130, 14, grid_export_now, 5000.0f, export_color, "Export Last");

        it.printf(20, 164, id(font_small), import_color, TextAlign::TOP_LEFT, "Bezug heute");
        it.printf(20, 184, id(font_medium), text, TextAlign::TOP_LEFT, "%.2f kWh", grid_import_day);

        it.printf(174, 164, id(font_small), export_color, TextAlign::TOP_LEFT, "Einspeisung heute");
        it.printf(174, 184, id(font_medium), text, TextAlign::TOP_LEFT, "%.2f kWh", grid_export_day);
      }

      if (id(ha_time).now().is_valid()) {
        it.strftime(312, 8, id(font_small), text, TextAlign::TOP_RIGHT, "%H:%M", id(ha_time).now());
      }

      draw_nav_tab(0, 80, 0, "Ueber", solar_color);
      draw_nav_tab(80, 80, 1, "Detail", house_color);
      draw_nav_tab(160, 80, 2, "Summen", sum_color);
      draw_nav_tab(240, 80, 3, "Netz", import_color);

touchscreen:
  - platform: ft63x6
    interrupt_pin: GPIO39

binary_sensor:
  - platform: touchscreen
    name: "${friendly_name} Page Overview"
    internal: true
    x_min: 0
    x_max: 79
    y_min: 214
    y_max: 239
    on_press:
      - lambda: |-
          id(active_page) = 0;
      - component.update: main_display

  - platform: touchscreen
    name: "${friendly_name} Page Details"
    internal: true
    x_min: 80
    x_max: 159
    y_min: 214
    y_max: 239
    on_press:
      - lambda: |-
          id(active_page) = 1;
      - component.update: main_display

  - platform: touchscreen
    name: "${friendly_name} Page Summary"
    internal: true
    x_min: 160
    x_max: 239
    y_min: 214
    y_max: 239
    on_press:
      - lambda: |-
          id(active_page) = 2;
      - component.update: main_display

  - platform: touchscreen
    name: "${friendly_name} Page Grid"
    internal: true
    x_min: 240
    x_max: 319
    y_min: 214
    y_max: 239
    on_press:
      - lambda: |-
          id(active_page) = 3;
      - component.update: main_display
