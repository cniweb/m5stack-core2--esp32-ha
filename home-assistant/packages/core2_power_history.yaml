# Paket fuer das Core2-Energiedisplay.
#
# Dieses Paket ist auf die aktuell in Home Assistant vorhandenen Sensoren
# zugeschnitten und bevorzugt echte Zaehlerstaende, wo diese bereits verfuegbar
# sind.
#
# Verwendete Quellsensoren:
# - sensor.house_energy_solar_total          (W)
# - sensor.leistung_haushalt                 (W)
# - sensor.strom_haushalt_bezug              (Wh, total_increasing)
# - sensor.strom_haushalt_einspeisung        (Wh, total_increasing)
#
# Netzleistung wird weiterhin aus den Live-Leistungswerten abgeleitet.
# Die Tagesenergie fuer Netzbezug und Einspeisung wird aus den echten
# Gesamtzaehlern ueber utility_meter erzeugt.
#
# Wichtig:
# Die beiden Zwischenzaehler mit unique_id `core2_grid_*_energy_total_kwh`
# werden in Home Assistant als `sensor.core2_grid_*_energy_total` angelegt.
# Die utility_meter-Quellen muessen deshalb auf diese tatsaechlichen Entity-IDs
# zeigen, sonst bleiben die Tageszaehler dauerhaft bei `0` und `collecting`.

template:
  - sensor:
      - name: "Core2 Solar Live"
        unique_id: core2_solar_live
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.house_energy_solar_total') | float(0) }}"

      - name: "Core2 House Live"
        unique_id: core2_house_live
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.leistung_haushalt') | float(0) }}"

      - name: "Core2 Grid Import Power"
        unique_id: core2_grid_import_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: >-
          {% set house = states('sensor.leistung_haushalt') | float(0) %}
          {% set solar = states('sensor.house_energy_solar_total') | float(0) %}
          {{ [house - solar, 0] | max }}

      - name: "Core2 Grid Export Power"
        unique_id: core2_grid_export_power
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: >-
          {% set house = states('sensor.leistung_haushalt') | float(0) %}
          {% set solar = states('sensor.house_energy_solar_total') | float(0) %}
          {{ [solar - house, 0] | max }}

      - name: "Core2 Grid Import Energy Total"
        default_entity_id: sensor.core2_grid_import_energy_total
        unique_id: core2_grid_import_energy_total_kwh
        unit_of_measurement: "kWh"
        state_class: total_increasing
        device_class: energy
        state: >-
          {{ (states('sensor.strom_haushalt_bezug') | float(0) / 1000) | round(3) }}

      - name: "Core2 Grid Export Energy Total"
        default_entity_id: sensor.core2_grid_export_energy_total
        unique_id: core2_grid_export_energy_total_kwh
        unit_of_measurement: "kWh"
        state_class: total_increasing
        device_class: energy
        state: >-
          {{ (states('sensor.strom_haushalt_einspeisung') | float(0) / 1000) | round(3) }}

sensor:
  - platform: integration
    source: sensor.core2_solar_live
    name: Core2 Solar Energy Total
    unique_id: core2_solar_energy_total
    unit_time: h
    unit_prefix: k
    round: 5
    method: trapezoidal

  - platform: integration
    source: sensor.core2_house_live
    name: Core2 House Energy Total
    unique_id: core2_house_energy_total
    unit_time: h
    unit_prefix: k
    round: 3
    method: trapezoidal

utility_meter:
  core2_solar_day_energy_kwh:
    source: sensor.core2_solar_energy_total
    cycle: daily

  core2_house_day_energy_kwh:
    source: sensor.core2_house_energy_total
    cycle: daily

  core2_grid_import_day_energy_kwh:
    source: sensor.core2_grid_import_energy_total
    cycle: daily

  core2_grid_export_day_energy_kwh:
    source: sensor.core2_grid_export_energy_total
    cycle: daily

# Fuer eine erste UI kann man Stunden-Buckets spaeter als eigene Sensoren
# modellieren. Mit deinem Sensor `sensor.stromverbrauch_haushalt_stundlich`
# ist bereits eine gute Basis fuer kuenftige Import-Historie vorhanden.

# Beispiel fuer spaetere Zielnamen:
# sensor.core2_solar_bucket_00
# sensor.core2_solar_bucket_01
# ...
# sensor.core2_house_bucket_00
# sensor.core2_house_bucket_01
